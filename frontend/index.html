<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyPath Flight Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>✈ SkyPath</h1>
    <p>Find the best flight connections worldwide</p>
  </header>

  <main>
    <section class="search-box">
      <div class="form-row">
        <div class="form-group">
          <label for="origin">From</label>
          <input id="origin" type="text" placeholder="JFK" maxlength="3" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="destination">To</label>
          <input id="destination" type="text" placeholder="LAX" maxlength="3" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input id="date" type="date" value="2024-03-15" />
        </div>
        <button id="search-btn" onclick="handleSearch()">Search Flights</button>
      </div>
      <div id="form-error" class="form-error hidden"></div>
    </section>

    <section id="results-section">
       <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Searching flights...</p>
        </div>

      <div id="api-error" class="api-error hidden"></div>

      <div id="results-header" class="hidden">
        <p id="results-count"></p>
      </div>

      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">🔍</div>
        <p>No flights found</p>
        <p>Try a different route or date</p>
      </div>

      <div id="itineraries"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
