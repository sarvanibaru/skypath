services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./flights.json:/app/flights.json:ro
    environment:
      - FLIGHTS_DATA_PATH=/app/flights.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy